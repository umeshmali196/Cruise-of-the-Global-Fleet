<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CruiseManager | Register</title>
  <link rel="stylesheet" href="register.css" />
</head>
<body>

  <div class="register-container">

    <!-- LEFT FORM SIDE -->
    <div class="form-section">
      <div class="form-box">
        <h2>Create Account</h2>
        <p class="desc">Start your journey with CruiseManager</p>

        <!-- Registration Form -->
        <form action="images\src\com\cruise\db\WebContent\register.jsp" method="post">

          <div class="input-group">
            <label for="fullname">Full Name</label>
            <input type="text" id="fullname" name="fullname" required placeholder="John Doe" requ/>
          </div>

          <div class="input-group">
            <label for="username">Username</label>
            <input type="text" id="username" name="username" required placeholder="john123" />
          </div>

          <div class="input-group">
            <label for="email">Email</label>
            <input type="email" id="email" name="email" required placeholder="john@example.com" />
          </div>

          <div class="input-group">
            <label for="phone">Phone</label>
            <input type="text" id="phone" name="phone" required placeholder="+91 9876543210" />
          </div>

          <div class="input-group">
            <label for="password">Password</label>
            <input type="password" id="password" name="password" required placeholder="Enter password" />
          </div>

          <button type="submit" class="btn-register">Register</button>
        </form>

        <p class="bottom-text">
          Already have an account? <a href="login.html">Login here</a>
        </p>
      </div>
    </div>

    <!-- RIGHT SIDE BACKGROUND -->
    <div class="image-section">
      <div class="overlay">
        <h1>Cruise<span>Manager</span></h1>
        <p>Plan, Book & Manage your dream cruise effortlessly 🌅</p>
      </div>
    </div>

  </div>

</body>
</html>
