<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Forgot Password | Cruise Manager</title>
  <link rel="stylesheet" href="Forgot password.css" />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
</head>

<body>
  <div class="bg-image"></div>

  <div class="forgot-container">
    <div class="forgot-card fade-in">
      <h1>Forgot Password?</h1>
      <p>Enter your registered email address and we’ll send you a link to reset your password.</p>

      <form>
        <label for="email">Email Address</label>
        <input type="email" id="email" placeholder="john@example.com" required />

        <button type="submit" class="btn">Send Reset Link</button>
      </form>

      <div class="links">
        <p>Remember your password? <a href="login.html">Back to Login</a></p>
      </div>
    </div>
  </div>
</body>
</html>
